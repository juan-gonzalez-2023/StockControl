<div class="navbar">
  <button
    type="button"
    class="navbar__close"
    aria-label="Cerrar menú"
    (click)="closeSidebar.emit()"
  >
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <img
    class="navbar__logo"
    src="assets/images/logo.PNG"
    alt="StockControl"
  />
  <div class="navbar__menu">
    <div class="navbar__menu-item navbar__search">
      <label class="navbar__search-label" for="product-search">Buscar productos</label>
      <div class="navbar__search-box">
        <span class="material-symbols-outlined navbar__search-icon" aria-hidden="true">search</span>
        <input
          id="product-search"
          type="search"
          class="navbar__search-input"
          placeholder="Buscar…"
          autocomplete="off"
          [value]="productsList.searchQuery()"
          (input)="onSearch($event)"
        />
      </div>
    </div>
    <div class="navbar__menu-item">
      <button
        type="button"
        class="navbar__menu-btn"
        aria-label="Crear producto"
        (click)="openCreateModal()"
      >
        <span class="navbar__menu-btn-text">Crear producto</span>
        <span class="material-symbols-outlined navbar__menu-btn-icon">add</span>
      </button>
    </div>
  </div>
  <div class="navbar__footer">
    <button
      type="button"
      class="navbar__logout-btn"
      aria-label="Cerrar sesión"
      (click)="logout()"
    >
      <span class="material-symbols-outlined navbar__logout-btn-icon">logout</span>
    </button>
  </div>
</div>
