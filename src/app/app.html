<div class="app-shell">
  <app-navbar />
  <main class="app-shell__content">
    <router-outlet />
  </main>
</div>

@if (modalService.isCreateOpen()) {
  <app-modal-create (closed)="modalService.closeCreate()" />
}

@if (modalService.isEditOpen() && modalService.productToEdit(); as product) {
  <app-modal-edit [product]="product" (closed)="modalService.closeEdit()" />
}
